<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGO Print — Plantillas de Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F7F6F3; --surface:#FFF; --border:#E8E6E1; --border2:#D4D0C8;
  --text:#1C1917; --muted:#78716C; --faint:#A8A29E;
  --gold:#C9A84C; --gold-lt:#FDF6E3; --gold-dk:#9A7B2E;
  --green:#2D6A4F; --radius:12px; --radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06); --shadow-md:0 4px 16px rgba(0,0,0,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',system-ui,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:17px;font-weight:600;letter-spacing:-.2px}.logo span{color:var(--gold)}
.header-right{display:flex;gap:8px;align-items:center}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:none;cursor:pointer;transition:opacity .12s;white-space:nowrap}
.btn:active{opacity:.75}.btn-gold{background:var(--gold);color:#fff}
.btn-outline{background:var(--surface);color:var(--text);border:1px solid var(--border2)}
.btn-ghost{background:none;color:var(--muted);border:1px solid var(--border)}
.btn:disabled{opacity:.4;cursor:default}

/* MAIN */
.main{flex:1;padding:32px 28px 100px;max-width:920px;margin:0 auto;width:100%}

/* SEARCH CARD */
.search-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 28px;box-shadow:var(--shadow);margin-bottom:20px}
.search-title{font-size:20px;font-weight:600;margin-bottom:4px}
.search-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.search-row{display:flex;gap:10px}
.search-input{flex:1;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:15px;background:var(--bg);color:var(--text);outline:none}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12)}
.results-wrap{position:relative}
.results-list{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);margin-top:6px;max-height:280px;overflow-y:auto;box-shadow:var(--shadow-md);display:none}
.results-list.open{display:block}
.result-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s}
.result-item:last-child{border-bottom:none}.result-item:hover{background:var(--gold-lt)}
.result-item img{width:36px;height:36px;object-fit:contain;border-radius:4px;background:#f2efe8;flex-shrink:0}
.result-name{font-size:13px;font-weight:500}
.result-meta{font-size:11px;color:var(--faint);font-family:'DM Mono',monospace;margin-top:1px}
.result-msg{padding:20px;text-align:center;font-size:13px;color:var(--faint)}

/* SET LOADED */
.set-loaded{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);margin-bottom:20px;display:none}
.set-loaded.visible{display:block}
.set-loaded-header{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
.set-loaded-img{width:52px;height:52px;object-fit:contain;border-radius:8px;background:#f2efe8;flex-shrink:0}
.set-loaded-info h2{font-size:16px;font-weight:600}
.set-loaded-info p{font-size:12px;color:var(--faint);font-family:'DM Mono',monospace;margin-top:2px}
.set-actions{margin-left:auto;display:flex;gap:6px}
.set-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.set-search{padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:13px;background:var(--bg);color:var(--text);outline:none;min-width:160px;flex:1}
.set-search:focus{border-color:var(--gold)}
.sel-count{font-size:13px;color:var(--muted);white-space:nowrap;margin-left:auto}

/* PILLS */
.pill-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);background:var(--surface);color:var(--muted);cursor:pointer}
.pill.active{background:var(--gold);border-color:var(--gold);color:#fff}

/* CARD SELECTOR GRID */
.card-selector-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;max-height:440px;overflow-y:auto;padding:2px}
.card-sel-item{border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;position:relative;transition:border-color .15s,transform .12s;background:var(--surface);user-select:none}
.card-sel-item:hover{border-color:var(--gold);transform:translateY(-1px)}
.card-sel-item.selected{border-color:var(--gold)}
.card-sel-item.selected::after{content:'✓';position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:var(--gold);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.card-sel-img-box{width:100%;padding-top:140%;position:relative;background:#f2efe8}
.card-sel-img-box img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:2px}
.card-sel-img-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--gold-dk);padding:4px;text-align:center;line-height:1.3}
.card-sel-body{padding:4px 5px 5px}
.card-sel-name{font-size:8px;font-weight:600;line-height:1.3;color:var(--text)}
.card-sel-code{font-size:7px;color:var(--faint);font-family:'DM Mono',monospace}
.rarity-dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:2px;vertical-align:middle;flex-shrink:0}
.dot-C{background:#A8A29E}.dot-R{background:#3B82F6}.dot-SR{background:#F59E0B}
.dot-UR{background:#EF4444}.dot-ScR{background:#8B5CF6}.dot-other{background:#D4D0C8}
.state-msg{padding:40px;text-align:center;color:var(--faint);font-size:14px;grid-column:1/-1}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 28px;display:none;align-items:center;justify-content:space-between;gap:12px;z-index:50}
.bottom-bar.visible{display:flex}
.bb-info{font-size:13px;color:var(--muted)}.bb-info strong{color:var(--text);font-weight:600}

/* PRINT AREA hidden on screen */
#print-area{display:none}

/* ══ PRINT ══ */
@media print {
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  body,html{background:#fff !important}
  .app-header,.main,.bottom-bar,#non-print{display:none !important}
  #print-area{display:block !important}

  @page{size:letter portrait;margin:9mm 7mm}

  .print-page{width:100%;page-break-after:always}
  .print-page:last-child{page-break-after:auto}

  /* Page header */
  .print-header{display:flex !important;align-items:center;justify-content:space-between;margin-bottom:5mm;padding-bottom:2.5mm;border-bottom:1.5px solid #C9A84C}
  .ph-left h1{font-size:13pt;font-weight:700;color:#1C1917}
  .ph-left p{font-size:7.5pt;color:#78716C;margin-top:.5mm;font-family:'DM Mono',monospace}
  .ph-right{font-size:7.5pt;color:#78716C;text-align:right}
  .ph-logo{font-size:9pt;font-weight:600;color:#C9A84C;margin-bottom:.5mm}

  /* 4×4 grid */
  .print-grid{display:grid !important;grid-template-columns:repeat(4,1fr);gap:3.5mm;width:100%}

  /* Each card */
  .print-card{border:1px solid #E8E6E1;border-radius:3.5mm;overflow:hidden;page-break-inside:avoid;background:#fff}

  /* Card image */
  .pc-img{width:100%;padding-top:62%;position:relative;background:#F7F6F3;border-bottom:1px solid #E8E6E1}
  .pc-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:1.5mm}
  .pc-img-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6.5pt;color:#C9A84C;padding:2mm;text-align:center;line-height:1.3}

  /* Card body */
  .pc-body{padding:1.8mm 2.2mm 2.2mm}
  .pc-name{font-size:6.5pt;font-weight:700;line-height:1.3;color:#1C1917;margin-bottom:.8mm}
  .pc-code{font-size:5.5pt;color:#A8A29E;font-family:'DM Mono',monospace;margin-bottom:1mm}
  .pc-badge{display:inline-block;font-size:5.5pt;font-weight:700;padding:.4mm 1.8mm;border-radius:2mm;margin-bottom:1.5mm}
  .pb-C{background:#f0f0f0;color:#555}.pb-R{background:#DBEAFE;color:#1D4ED8}
  .pb-SR{background:#FEF3C7;color:#92400E}.pb-UR{background:#FEE2E2;color:#991B1B}
  .pb-ScR{background:#EDE9FE;color:#5B21B6}.pb-other{background:#f0f0f0;color:#555}

  /* 1st Ed / Unlimited checkboxes */
  .pc-edition{display:flex;gap:2.5mm;align-items:center;margin-bottom:1.5mm}
  .pc-ed-opt{display:flex;align-items:center;gap:.8mm;font-size:6pt;color:#1C1917;font-weight:600}
  .pc-checkbox{width:3mm;height:3mm;border:.5pt solid #78716C;border-radius:.4mm;flex-shrink:0}

  /* Fill fields */
  .pc-fields{display:flex;flex-direction:column;gap:1.2mm}
  .pc-field{display:flex;align-items:flex-end;gap:1.2mm}
  .pc-field-lbl{font-size:5.5pt;color:#78716C;white-space:nowrap;min-width:12mm;line-height:1}
  .pc-field-line{flex:1;border-bottom:.5pt solid #D4D0C8;height:3mm}
}

@media(max-width:600px){
  .app-header{padding:0 16px}
  .main{padding:20px 16px 90px}
  .search-card{padding:16px}
  .card-selector-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}
  .bottom-bar{padding:10px 16px}
  .set-actions{width:100%}
}
</style>
</head>
<body>

<div id="non-print">
<!-- HEADER -->
<header class="app-header">
  <div class="logo">YGO <span>Print</span></div>
  <div class="header-right">
    <span id="header-count" style="font-size:13px;color:var(--muted)"></span>
    <button class="btn btn-ghost" id="btn-clear" onclick="deselectAll()" style="display:none">Limpiar selección</button>
    <button class="btn btn-gold" id="btn-print" onclick="generatePrint()" disabled>🖨 Imprimir plantilla</button>
  </div>
</header>

<!-- MAIN -->
<main class="main">

  <!-- Search -->
  <div class="search-card">
    <div class="search-title">Plantillas de inventario</div>
    <div class="search-sub">Busca un set, elige las cartas que quieres incluir y genera tu hoja para llenar a mano — 16 cartas por hoja tamaño carta.</div>
    <div class="results-wrap">
      <div class="search-row">
        <input class="search-input" id="set-search" placeholder="Buscar set (ej. Maze of Millennia)..." oninput="onSetSearch(this.value)" autocomplete="off">
        <button class="btn btn-outline" onclick="clearSet()">Cambiar set</button>
      </div>
      <div class="results-list" id="results-list"></div>
    </div>
  </div>

  <!-- Set loaded -->
  <div class="set-loaded" id="set-loaded">
    <div class="set-loaded-header">
      <img class="set-loaded-img" id="set-img" alt="">
      <div class="set-loaded-info">
        <h2 id="set-title"></h2>
        <p id="set-subtitle"></p>
      </div>
      <div class="set-actions">
        <button class="btn btn-ghost" onclick="selectAll()">Todas</button>
        <button class="btn btn-ghost" onclick="deselectAll()">Ninguna</button>
      </div>
    </div>

    <!-- Rarity pills -->
    <div class="pill-row">
      <button class="pill active" onclick="setRarityFilter('all',this)">Todas</button>
      <button class="pill" onclick="setRarityFilter('C',this)">Common</button>
      <button class="pill" onclick="setRarityFilter('R',this)">Rare</button>
      <button class="pill" onclick="setRarityFilter('SR',this)">Super Rare</button>
      <button class="pill" onclick="setRarityFilter('UR',this)">Ultra Rare</button>
      <button class="pill" onclick="setRarityFilter('ScR',this)">Secret Rare</button>
    </div>

    <!-- Toolbar -->
    <div class="set-toolbar">
      <input class="set-search" id="card-filter" placeholder="Filtrar por nombre o código..." oninput="applyCardFilter(this.value)">
      <span class="sel-count" id="sel-count"></span>
    </div>

    <!-- Grid -->
    <div class="card-selector-grid" id="card-grid"></div>
  </div>

</main>

<!-- Bottom bar -->
<div class="bottom-bar" id="bottom-bar">
  <div class="bb-info">
    <strong id="bb-count">0</strong> cartas seleccionadas ·
    <span id="bb-pages">0 páginas</span> (16 por hoja, carta)
  </div>
  <button class="btn btn-gold" onclick="generatePrint()">🖨 Generar e imprimir</button>
</div>
</div><!-- /#non-print -->

<!-- PRINT AREA -->
<div id="print-area"></div>

<script>
const SET_IMG = "https://images.ygoprodeck.com/images/sets/";
let allApiSets   = null;
let currentSet   = null;
let allCards     = [];
let selected     = new Set();
let rarityFilter = 'all';
let cardFilterQ  = '';
let searchTimer  = null;

/* ── RAREZA ── */
function rarityKey(r) {
  if (!r) return 'other';
  const l = r.toLowerCase();
  if (l.includes('secret')) return 'ScR';
  if (l.includes('ultra'))  return 'UR';
  if (l.includes('super'))  return 'SR';
  if (l.includes('rare'))   return 'R';
  if (l.includes('common')) return 'C';
  return 'other';
}
function rarityLabel(r) {
  const k = rarityKey(r);
  return k === 'other' ? (r||'').substring(0,6) : k;
}

/* ── CARGAR LISTA DE SETS ── */
async function loadAllSets() {
  if (allApiSets) return;
  try {
    const r  = await fetch('https://db.ygoprodeck.com/api/v7/cardsets.php');
    allApiSets = await r.json();
  } catch(e) { allApiSets = []; }
}

/* ── BÚSQUEDA DE SET ── */
function onSetSearch(q) {
  clearTimeout(searchTimer);
  const list = document.getElementById('results-list');
  if (!q.trim()) { list.classList.remove('open'); return; }
  list.classList.add('open');
  list.innerHTML = '<div class="result-msg">Buscando...</div>';
  searchTimer = setTimeout(async () => {
    await loadAllSets();
    const ql    = q.toLowerCase();
    const found = (allApiSets||[]).filter(s => s.set_name.toLowerCase().includes(ql)).slice(0,20);
    if (!found.length) { list.innerHTML = '<div class="result-msg">Sin resultados.</div>'; return; }
    list.innerHTML = found.map(s => `
      <div class="result-item" data-set-code="${s.set_code}" data-set-name="${s.set_name.replace(/"/g,'&quot;')}" data-num="${s.num_of_cards||0}" onclick="loadSetFromDiv(this)">
        <img src="${SET_IMG}${encodeURIComponent(s.set_code)}.jpg" onerror="this.style.opacity='.3'" alt="">
        <div>
          <div class="result-name">${s.set_name}</div>
          <div class="result-meta">${s.set_code} · ${s.num_of_cards||'?'} cartas</div>
        </div>
      </div>`).join('');
  }, 350);
}

function clearSet() {
  currentSet = null; allCards = []; selected.clear();
  rarityFilter = 'all'; cardFilterQ = '';
  document.getElementById('set-search').value = '';
  document.getElementById('card-filter').value = '';
  document.getElementById('results-list').classList.remove('open');
  document.getElementById('set-loaded').classList.remove('visible');
  document.querySelectorAll('.pill').forEach((p,i) => p.classList.toggle('active', i===0));
  updateUI();
}

function loadSetFromDiv(el) {
  const code = el.dataset.setCode;
  const name = el.dataset.setName;
  const total = parseInt(el.dataset.num) || 0;
  loadSet(code, name, total);
}

/* ── CARGAR CARTAS DEL SET ── */
async function loadSet(code, name, total) {
  document.getElementById('results-list').classList.remove('open');
  document.getElementById('set-search').value = name;
  document.getElementById('set-loaded').classList.add('visible');
  document.getElementById('set-title').textContent = name;
  document.getElementById('set-subtitle').textContent = `${code} · ${total||'?'} cartas`;
  document.getElementById('card-grid').innerHTML = '<div class="state-msg">Cargando cartas...</div>';

  const simg = document.getElementById('set-img');
  simg.src = SET_IMG + code + ".jpg";
  simg.onerror = () => { simg.src = ''; simg.style.display = 'none'; };

  currentSet = { code, name };
  allCards = []; selected.clear();
  rarityFilter = 'all'; cardFilterQ = '';
  document.getElementById('card-filter').value = '';
  document.querySelectorAll('.pill').forEach((p,i) => p.classList.toggle('active', i===0));

  try {
    const r    = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?cardset=${encodeURIComponent(name)}`);
    const data = await r.json();
    if (!data.data) {
      document.getElementById('card-grid').innerHTML = '<div class="state-msg">No se encontraron cartas.</div>';
      return;
    }

    const cardMap = new Map();
    data.data.forEach(card => {
      const csets = (card.card_sets||[]).filter(s => s.set_code && s.set_code.toUpperCase().startsWith(code.toUpperCase()));
      if (csets.length) {
        csets.forEach(cs => {
          const key = card.id;
          if (!cardMap.has(key)) {
            cardMap.set(key, {
              id: card.id, name: card.name,
              img: card.card_images?.[0]?.image_url_small || '',
              code: cs.set_code, rarity: cs.set_rarity || '',
              key: card.id
            });
          }
        });
      } else {
        const key = card.id;
        if (!cardMap.has(key)) {
          cardMap.set(key, {
            id: card.id, name: card.name,
            img: card.card_images?.[0]?.image_url_small || '',
            code: '', rarity: '', key: card.id
          });
        }
      }
    });

    allCards = Array.from(cardMap.values());

    allCards.sort((a,b) => a.code.localeCompare(b.code));
    allCards.forEach(c => selected.add(c.key)); // todas seleccionadas por defecto
    renderGrid();
    updateUI();
  } catch(e) {
    document.getElementById('card-grid').innerHTML = '<div class="state-msg">Error al cargar. Verifica tu conexión.</div>';
  }
}

/* ── RENDER GRID ── */
function renderGrid() {
  let list = [...allCards];
  if (rarityFilter !== 'all') list = list.filter(c => rarityKey(c.rarity) === rarityFilter);
  if (cardFilterQ) list = list.filter(c =>
    c.name.toLowerCase().includes(cardFilterQ) ||
    c.code.toLowerCase().includes(cardFilterQ)
  );

  const grid = document.getElementById('card-grid');
  if (!list.length) { grid.innerHTML = '<div class="state-msg">Sin cartas con ese filtro.</div>'; return; }

  grid.innerHTML = list.map(c => {
    const rk  = rarityKey(c.rarity);
    const sel = selected.has(c.key);
    const sk  = c.key.replace(/[^a-z0-9]/gi,'_');
    return `
      <div class="card-sel-item${sel?' selected':''}" id="csi-${sk}" onclick="toggleCard('${c.key}')">
        <div class="card-sel-img-box">
          <img src="${c.img}" alt="${c.name}" loading="lazy"
               onerror="this.style.display='none';var fb=document.getElementById('cfb-${sk}');if(fb)fb.style.display='flex'">
          <div class="card-sel-img-fb" id="cfb-${sk}" style="display:none">${c.name}</div>
        </div>
        <div class="card-sel-body">
          <div class="card-sel-name">
            <span class="rarity-dot dot-${rk}"></span>${c.name}
          </div>
          ${c.code?`<div class="card-sel-code">${c.code}</div>`:''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('sel-count').textContent =
    `${selected.size} de ${allCards.length} seleccionadas`;
}

/* ── SELECCIÓN ── */
function toggleCard(key) {
  if (selected.has(key)) selected.delete(key);
  else                   selected.add(key);
  const c  = allCards.find(x => x.key === key);
  if (!c) return;
  const sk = c.key.replace(/[^a-z0-9]/gi,'_');
  const el = document.getElementById(`csi-${sk}`);
  if (el) el.classList.toggle('selected', selected.has(key));
  document.getElementById('sel-count').textContent =
    `${selected.size} de ${allCards.length} seleccionadas`;
  updateUI();
}
function selectAll()   { allCards.forEach(c => selected.add(c.key));  renderGrid(); updateUI(); }
function deselectAll() { selected.clear();                             renderGrid(); updateUI(); }

/* ── FILTROS ── */
function setRarityFilter(r, btn) {
  rarityFilter = r;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
function applyCardFilter(q) { cardFilterQ = q.toLowerCase(); renderGrid(); }

/* ── UPDATE UI ── */
function updateUI() {
  const n     = selected.size;
  const pages = Math.ceil(n / 16);
  document.getElementById('header-count').textContent = n > 0 ? `${n} cartas` : '';
  document.getElementById('btn-clear').style.display  = n > 0 ? '' : 'none';
  document.getElementById('btn-print').disabled       = n === 0;
  const bb = document.getElementById('bottom-bar');
  if (n > 0) {
    bb.classList.add('visible');
    document.getElementById('bb-count').textContent = n;
    document.getElementById('bb-pages').textContent = `${pages} página${pages!==1?'s':''}`;
  } else {
    bb.classList.remove('visible');
  }
}

/* ── GENERAR IMPRESIÓN ── */
function generatePrint() {
  if (!currentSet || selected.size === 0) return;

  const cards   = allCards.filter(c => selected.has(c.key));
  const perPage = 16;
  const pages   = Math.ceil(cards.length / perPage);
  const today   = new Date().toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'});
  const area    = document.getElementById('print-area');

  area.innerHTML = Array.from({length: pages}, (_,pi) => {
    const slice = cards.slice(pi * perPage, (pi+1) * perPage);
    const cardsHtml = slice.map(c => {
      const sk = c.key.replace(/[^a-z0-9]/gi,'_');
      return `
        <div class="print-card">
          <div class="pc-img">
            <img src="${c.img}" alt="${c.name}"
                 onerror="this.style.display='none';document.getElementById('pfb-${sk}').style.display='flex'">
            <div class="pc-img-fb" id="pfb-${sk}" style="display:none">${c.name}</div>
          </div>
          <div class="pc-body">
            <div class="pc-name">${c.name}</div>
            ${c.code?`<div class="pc-code">${c.code}</div>`:''}
            <div class="pc-fields">
              <div class="pc-field"><div class="pc-field-lbl">Cantidad</div><div class="pc-field-line"></div></div>
              <div class="pc-field"><div class="pc-field-lbl">Condición</div><div class="pc-field-line"></div></div>
              <div class="pc-field"><div class="pc-field-lbl">Rareza</div><div class="pc-checkbox"></div></div>
            </div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="print-page">
        <div class="print-header">
          <div class="ph-left">
            <h1>${currentSet.name}</h1>
            <p>${currentSet.code} · Página ${pi+1} de ${pages} · ${slice.length} cartas</p>
          </div>
          <div class="ph-right">
            <div class="ph-logo">YGO Print</div>
            <div>${today}</div>
          </div>
        </div>
        <div class="print-grid">${cardsHtml}</div>
      </div>`;
  }).join('');

  // Esperar imágenes antes de imprimir
  const imgs = area.querySelectorAll('img');
  if (imgs.length === 0) { window.print(); return; }
  let done = 0;
  const tryPrint = () => { if (++done >= imgs.length) window.print(); };
  imgs.forEach(img => {
    if (img.complete) tryPrint();
    else { img.onload = tryPrint; img.onerror = tryPrint; }
  });
  setTimeout(window.print, 5000); // fallback
}

/* ── CERRAR DROPDOWN AL CLICK FUERA ── */
document.addEventListener('click', e => {
  if (!e.target.closest('.results-wrap'))
    document.getElementById('results-list').classList.remove('open');
});
</script>
